<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria Pro - Cadastro e Consulta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 15px; background-color: #e9ecef; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #007bff; margin-bottom: 20px; }
        .field-group { position: relative; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ced4da; box-sizing: border-box; font-size: 16px; }
        
        /* Botão da Lupa */
        .search-btn { position: absolute; right: 5px; top: 32px; background: none; border: none; font-size: 20px; cursor: pointer; color: #007bff; padding: 5px; }
        
        button.main-btn { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button.main-btn:hover { background-color: #218838; }
        
        #snapshot { width: 100%; margin-top: 10px; border-radius: 8px; display: none; border: 2px solid #ddd; }
        
        .tabela-container { overflow-x: auto; margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #dee2e6; font-size: 13px; }
        th { background-color: #007bff; color: white; }
        .btn-pdf { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .img-doc { width: 45px; height: 45px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistema Portaria</h2>
    
    <div class="field-group">
        <label>Documento (CPF/RG):</label>
        <input type="text" id="documento" placeholder="Digite para buscar ou cadastrar">
        <button class="search-btn" onclick="buscarPrestador()" title="Buscar prestador">🔍</button>
    </div>

    <div class="field-group">
        <label>Nome Completo:</label>
        <input type="text" id="nome" placeholder="Nome do prestador">
    </div>

    <div class="field-group">
        <label>Empresa:</label>
        <input type="text" id="empresa" placeholder="Ex: Enel, Vivo, Particular">
    </div>

    <div class="field-group">
        <label>Tipo de Serviço:</label>
        <input type="text" id="servico" placeholder="Ex: Manutenção Elétrica, Entrega">
    </div>

    <div class="field-group">
        <label>Apartamento Destino:</label>
        <input type="text" id="apto" placeholder="Ex: 101, 1902, Portaria">
    </div>

    <label>Foto:</label>
    <input type="file" id="fotoInput" accept="image/*" capture="camera">
    <img id="snapshot">

    <button class="main-btn" onclick="salvarRegistro()">REGISTRAR ENTRADA</button>
</div>

<div class="tabela-container">
    <table id="tabelaRegistros">
        <thead>
            <tr>
                <th>Data</th>
                <th>Nome/Apto</th>
                <th>Foto</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDgsGwJDm4kRlpTxJ8ZOt4VjU8Iy_Ahztg",
        authDomain: "prestadores-de-servi.firebaseapp.com",
        projectId: "prestadores-de-servi",
        storageBucket: "prestadores-de-servi.firebasestorage.app",
        messagingSenderId: "1898757786612",
        appId: "1:1898757786612:web:76ca92227286918af3db91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // --- FUNÇÃO BUSCAR (LUPA) ---
    window.buscarPrestador = async function() {
        const docBusca = document.getElementById('documento').value;
        if(!docBusca) return alert("Digite o documento para buscar!");

        const q = query(collection(db, "prestadores_base"), where("documento", "==", docBusca));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
            const dados = querySnapshot.docs[0].data();
            document.getElementById('nome').value = dados.nome;
            document.getElementById('empresa').value = dados.empresa;
            alert("Prestador encontrado! Dados preenchidos.");
        } else {
            alert("Prestador não encontrado no cadastro base.");
        }
    }

    // Prévia da imagem
    document.getElementById('fotoInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = document.getElementById('snapshot');
            img.src = event.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // --- SALVAR REGISTRO ---
    window.salvarRegistro = async function() {
        const nome = document.getElementById('nome').value;
        const documento = document.getElementById('documento').value;
        const empresa = document.getElementById('empresa').value;
        const servico = document.getElementById('servico').value;
        const apto = document.getElementById('apto').value;
        const file = document.getElementById('fotoInput').files[0];

        if (!nome || !apto) return alert("Nome e Apartamento são obrigatórios!");

        try {
            let urlFoto = "";
            if (file) {
                const sRef = ref(storage, `fotos/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                urlFoto = await getDownloadURL(sRef);
            }

            // Salva o registro de entrada
            await addDoc(collection(db, "registros"), {
                nome, documento, empresa, servico, apto, foto: urlFoto, data: new Date().toLocaleString()
            });

            // Salva/Atualiza na base de prestadores para a lupa achar depois
            const qBase = query(collection(db, "prestadores_base"), where("documento", "==", documento));
            const snapBase = await getDocs(qBase);
            if(snapBase.empty && documento) {
                await addDoc(collection(db, "prestadores_base"), { nome, documento, empresa });
            }

            alert("Entrada registrada!");
            location.reload();
        } catch (e) { console.error(e); alert("Erro ao salvar!"); }
    }

    // --- GERAR PDF ---
    window.gerarPDF = function(dados) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(20);
        doc.text("Comprovante de Entrada", 20, 20);
        doc.setFontSize(12);
        doc.text(`Data: ${dados.data}`, 20, 40);
        doc.text(`Prestador: ${dados.nome}`, 20, 50);
        doc.text(`Documento: ${dados.documento}`, 20, 60);
        doc.text(`Empresa: ${dados.empresa}`, 20, 70);
        doc.text(`Serviço: ${dados.servico}`, 20, 80);
        doc.text(`Destino: Apto ${dados.apto}`, 20, 90);
        doc.text(`__________________________`, 20, 110);
        doc.text(`Assinatura Portaria`, 20, 115);

        doc.save(`registro_${dados.nome}.pdf`);
    }

    // Carregar Tabela
    const qTable = query(collection(db, "registros"), orderBy("data", "desc"));
    onSnapshot(qTable, (snap) => {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        snap.forEach(docSnap => {
            const d = docSnap.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${d.data.split(' ')[0]}</td>
                <td>${d.nome}<br><small>Apto: ${d.apto}</small></td>
                <td><img src="${d.foto || 'https://via.placeholder.com/45'}" class="img-doc"></td>
                <td><button class="btn-pdf" id="btn-${docSnap.id}">PDF</button></td>
            `;
            corpo.appendChild(tr);
            document.getElementById(`btn-${docSnap.id}`).onclick = () => gerarPDF(d);
        });
    });
</script>
</body>
</html>
