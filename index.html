<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Portaria Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #555; }
        input, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        
        /* Sistema de Sugestão de Nome */
        .field-group { position: relative; }
        #listaSugestoes { 
            position: absolute; width: 100%; background: white; border: 1px solid #ccc; 
            z-index: 1000; display: none; max-height: 200px; overflow-y: auto; border-radius: 0 0 4px 4px;
        }
        .sugestao-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .sugestao-item:hover { background-color: #f0f0f0; }

        button.btn-registrar { background-color: #007bff; color: white; border: none; cursor: pointer; margin-top: 20px; font-weight: bold; }
        button.btn-registrar:disabled { background-color: #ccc; }
        
        #snapshot { width: 100%; margin-top: 10px; border-radius: 8px; display: none; border: 1px solid #ddd; }
        
        table { width: 100%; margin-top: 30px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 13px; }
        th { background-color: #007bff; color: white; }
        .btn-pdf { background-color: #dc3545; color: white; border: none; padding: 6px; cursor: pointer; width: 100%; margin-bottom: 5px; border-radius: 4px; }
        .btn-saida { background-color: #ffc107; color: black; border: none; padding: 6px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 4px; }
        .img-doc { width: 55px; height: 55px; object-fit: cover; border-radius: 4px; border: 1px solid #eee; }
        .texto-saida { color: #d9534f; font-weight: bold; font-size: 11px; display: block; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Portaria</h2>
    
    <div class="field-group">
        <label>Nome do Prestador:</label>
        <input type="text" id="nome" placeholder="Digite para buscar..." autocomplete="off">
        <div id="listaSugestoes"></div>
    </div>

    <label>Documento (RG/CPF):</label>
    <input type="text" id="documento" placeholder="000.000.000-00">

    <label>Empresa:</label>
    <input type="text" id="empresa" placeholder="Ex: Enel, Vivo, Particular">

    <label>Tipo de Serviço:</label>
    <input type="text" id="servico" placeholder="O que veio fazer?">

    <label>Apartamento:</label>
    <input type="text" id="apto" placeholder="Número da unidade">

    <label>Foto:</label>
    <input type="file" id="fotoInput" accept="image/*" capture="camera">
    <img id="snapshot">

    <button class="btn-registrar" id="btnSalvar" onclick="salvarRegistro()">SALVAR E REGISTRAR ENTRADA</button>
</div>

<table>
    <thead>
        <tr>
            <th>Entrada / Nome</th>
            <th>Foto</th>
            <th>Ação</th>
        </tr>
    </thead>
    <tbody id="corpoTabela"></tbody>
</table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, doc, query, getDocs, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    // Chaves do seu Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDgsGwJDm4kRlpTxJ8ZOt4VjU8Iy_Ahztg",
        authDomain: "prestadores-de-servi.firebaseapp.com",
        projectId: "prestadores-de-servi",
        storageBucket: "prestadores-de-servi.firebasestorage.app",
        messagingSenderId: "1898757786612",
        appId: "1:1898757786612:web:76ca92227286918af3db91"
    };

    // Sua Chave do ImgBB integrada
    const IMGBB_API_KEY = "D5965f737b97c8e7128c7bd5f66ebd7c"; 

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const inputNome = document.getElementById('nome');
    const listaSugestoes = document.getElementById('listaSugestoes');

    // Busca Automática por Nome
    inputNome.addEventListener('input', async () => {
        const valor = inputNome.value.toLowerCase();
        if (valor.length < 2) { listaSugestoes.style.display = 'none'; return; }
        const q = query(collection(db, "prestadores_base"));
        const snap = await getDocs(q);
        listaSugestoes.innerHTML = "";
        let encontrou = false;
        snap.forEach(d => {
            const p = d.data();
            if (p.nome.toLowerCase().includes(valor)) {
                encontrou = true;
                const div = document.createElement('div');
                div.className = 'sugestao-item';
                div.innerText = p.nome;
                div.onclick = () => {
                    document.getElementById('nome').value = p.nome;
                    document.getElementById('documento').value = p.documento;
                    document.getElementById('empresa').value = p.empresa;
                    listaSugestoes.style.display = 'none';
                };
                listaSugestoes.appendChild(div);
            }
        });
        listaSugestoes.style.display = encontrou ? 'block' : 'none';
    });

    // Preview da Foto
    document.getElementById('fotoInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            const img = document.getElementById('snapshot');
            img.src = ev.target.result; img.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // Salvar Registro (Foto no ImgBB + Dados no Firebase)
    window.salvarRegistro = async function() {
        const btn = document.getElementById('btnSalvar');
        const nome = document.getElementById('nome').value;
        const documento = document.getElementById('documento').value;
        const empresa = document.getElementById('empresa').value;
        const servico = document.getElementById('servico').value;
        const apto = document.getElementById('apto').value;
        const file = document.getElementById('fotoInput').files[0];

        if (!nome || !apto) return alert("Preencha o Nome e o Apartamento!");

        btn.innerText = "Processando Registro...";
        btn.disabled = true;

        try {
            let urlFoto = "";
            if (file) {
                const formData = new FormData();
                formData.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const json = await res.json();
                urlFoto = json.data.url;
            }

            const dataHora = new Date().toLocaleString("pt-BR");
            
            await addDoc(collection(db, "registros"), {
                nome, documento, empresa, servico, apto, foto: urlFoto, entrada: dataHora, saida: ""
            });

            // Adiciona na base de sugestões se for novo
            const snapB = await getDocs(query(collection(db, "prestadores_base")));
            let jaTem = false;
            snapB.forEach(d => { if(d.data().nome === nome) jaTem = true; });
            if(!jaTem) await addDoc(collection(db, "prestadores_base"), { nome, documento, empresa });

            alert("Entrada registrada!");
            location.reload();
        } catch (e) {
            alert("Erro ao registrar. Verifique a internet.");
        } finally {
            btn.disabled = false;
            btn.innerText = "SALVAR E REGISTRAR ENTRADA";
        }
    }

    // Registrar Saída
    window.registrarSaida = async function(id) {
        const confirmacao = confirm("Deseja registrar a saída agora?");
        if(!confirmacao) return;
        const agora = new Date().toLocaleString("pt-BR");
        await updateDoc(doc(db, "registros", id), { saida: agora });
        alert("Saída concluída!");
    }

    // Gerar PDF Completo
    window.gerarPDF = function(d) {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.setFontSize(18);
        docPDF.text("REGISTRO DE PORTARIA", 20, 20);
        docPDF.setFontSize(11);
        docPDF.text(`Nome: ${d.nome}`, 20, 40);
        docPDF.text(`Documento: ${d.documento || "N/A"}`, 20, 50);
        docPDF.text(`Empresa: ${d.empresa || "Particular"}`, 20, 60);
        docPDF.text(`Serviço: ${d.servico || "N/A"}`, 20, 70);
        docPDF.text(`Unidade: ${d.apto}`, 20, 80);
        docPDF.text(`Entrada: ${d.entrada}`, 20, 90);
        docPDF.text(`Saída: ${d.saida || "Ainda no local"}`, 20, 100);
        docPDF.save(`Registro_${d.nome.replace(/\s/g, '_')}.pdf`);
    }

    // Tabela em tempo real
    onSnapshot(query(collection(db, "registros"), orderBy("entrada", "desc")), (s) => {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        s.forEach(ds => {
            const data = ds.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <b>${data.entrada.split(' ')[1]}</b><br>
                    ${data.nome}<br>
                    <small>Apto: ${data.apto}</small>
                </td>
                <td><img src="${data.foto || 'https://via.placeholder.com/50'}" class="img-doc" onclick="window.open('${data.foto}')"></td>
                <td>
                    <button class="btn-pdf" id="pdf-${ds.id}">PDF</button>
                    ${data.saida === "" 
                        ? `<button class="btn-saida" id="out-${ds.id}">SAÍDA</button>` 
                        : `<span class="texto-saida">Saiu às: ${data.saida.split(' ')[1]}</span>`}
                </td>
            `;
            corpo.appendChild(tr);
            document.getElementById(`pdf-${ds.id}`).onclick = () => gerarPDF(data);
            if(data.saida === "") {
                document.getElementById(`out-${ds.id}`).onclick = () => registrarSaida(ds.id);
            }
        });
    });
</script>
</body>
</html>
