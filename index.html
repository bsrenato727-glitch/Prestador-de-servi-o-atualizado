<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria Pro - Cadastro Inteligente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 15px; background-color: #e9ecef; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #007bff; margin-bottom: 20px; }
        .field-group { position: relative; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ced4da; box-sizing: border-box; font-size: 16px; }
        
        /* Lista de Sugestões */
        #listaSugestoes {
            position: absolute; width: 100%; background: white; border: 1px solid #ddd;
            border-radius: 0 0 8px 8px; z-index: 1000; max-height: 150px; overflow-y: auto; display: none;
        }
        .sugestao-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .sugestao-item:hover { background-color: #f1f1f1; }

        button.main-btn { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #snapshot { width: 100%; margin-top: 10px; border-radius: 8px; display: none; border: 2px solid #ddd; }
        
        .tabela-container { overflow-x: auto; margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #dee2e6; font-size: 13px; }
        th { background-color: #007bff; color: white; }
        .btn-pdf { background-color: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .img-doc { width: 45px; height: 45px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistema Portaria</h2>
    
    <div class="field-group">
        <label>Nome Completo:</label>
        <input type="text" id="nome" placeholder="Comece a digitar o nome..." autocomplete="off">
        <div id="listaSugestoes"></div>
    </div>

    <div class="field-group">
        <label>Documento (CPF/RG):</label>
        <input type="text" id="documento" placeholder="Documento do prestador">
    </div>

    <div class="field-group">
        <label>Empresa:</label>
        <input type="text" id="empresa" placeholder="Ex: Enel, Particular">
    </div>

    <div class="field-group">
        <label>Tipo de Serviço:</label>
        <input type="text" id="servico" placeholder="Ex: Pintura, Entrega">
    </div>

    <div class="field-group">
        <label>Apartamento Destino:</label>
        <input type="text" id="apto" placeholder="Ex: 101, Portaria">
    </div>

    <label>Foto:</label>
    <input type="file" id="fotoInput" accept="image/*" capture="camera">
    <img id="snapshot">

    <button class="main-btn" onclick="salvarRegistro()">REGISTRAR E GERAR PDF</button>
</div>

<div class="tabela-container">
    <table>
        <thead>
            <tr>
                <th>Data/Hora</th>
                <th>Nome / Apto</th>
                <th>Foto</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, getDocs, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDgsGwJDm4kRlpTxJ8ZOt4VjU8Iy_Ahztg",
        authDomain: "prestadores-de-servi.firebaseapp.com",
        projectId: "prestadores-de-servi",
        storageBucket: "prestadores-de-servi.firebasestorage.app",
        messagingSenderId: "1898757786612",
        appId: "1:1898757786612:web:76ca92227286918af3db91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const inputNome = document.getElementById('nome');
    const listaSugestoes = document.getElementById('listaSugestoes');

    // --- BUSCA DINÂMICA ENQUANTO DIGITA ---
    inputNome.addEventListener('input', async () => {
        const valor = inputNome.value.toLowerCase();
        if (valor.length < 2) { listaSugestoes.style.display = 'none'; return; }

        const q = query(collection(db, "prestadores_base"));
        const snap = await getDocs(q);
        
        listaSugestoes.innerHTML = "";
        let encontrou = false;

        snap.forEach(doc => {
            const prestador = doc.data();
            if (prestador.nome.toLowerCase().includes(valor)) {
                encontrou = true;
                const div = document.createElement('div');
                div.className = 'sugestao-item';
                div.innerText = prestador.nome;
                div.onclick = () => {
                    document.getElementById('nome').value = prestador.nome;
                    document.getElementById('documento').value = prestador.documento;
                    document.getElementById('empresa').value = prestador.empresa;
                    listaSugestoes.style.display = 'none';
                };
                listaSugestoes.appendChild(div);
            }
        });

        listaSugestoes.style.display = encontrou ? 'block' : 'none';
    });

    // Fechar lista se clicar fora
    document.addEventListener('click', (e) => { if (e.target !== inputNome) listaSugestoes.style.display = 'none'; });

    // Foto Preview
    document.getElementById('fotoInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            const img = document.getElementById('snapshot');
            img.src = ev.target.result; img.style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // --- SALVAR REGISTRO ---
    window.salvarRegistro = async function() {
        const nome = document.getElementById('nome').value;
        const documento = document.getElementById('documento').value;
        const empresa = document.getElementById('empresa').value;
        const servico = document.getElementById('servico').value;
        const apto = document.getElementById('apto').value;
        const file = document.getElementById('fotoInput').files[0];

        if (!nome || !apto) return alert("Preencha Nome e Apto!");

        try {
            let url = "";
            if (file) {
                const sRef = ref(storage, `fotos/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                url = await getDownloadURL(sRef);
            }

            const dataAtual = new Date().toLocaleString("pt-BR");

            // 1. Salva a entrada atual
            await addDoc(collection(db, "registros"), {
                nome, documento, empresa, servico, apto, foto: url, data: dataAtual
            });

            // 2. Salva na base de dados para a busca automática futura (se for novo)
            const snapBase = await getDocs(query(collection(db, "prestadores_base")));
            let jaExiste = false;
            snapBase.forEach(d => { if(d.data().nome === nome) jaExiste = true; });
            
            if(!jaExiste) {
                await addDoc(collection(db, "prestadores_base"), { nome, documento, empresa });
            }

            alert("Registro Concluído!");
            location.reload();
        } catch (e) { alert("Erro ao salvar!"); }
    }

    // --- PDF COMPLETO ---
    window.gerarPDF = function(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(0, 123, 255); doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(18);
        doc.text("COMPROVANTE DE ACESSO - PORTARIA", 15, 20);
        doc.setTextColor(0); doc.setFontSize(12);
        doc.text(`DATA/HORA: ${d.data}`, 15, 50);
        doc.text(`PRESTADOR: ${d.nome}`, 15, 60);
        doc.text(`DOCUMENTO: ${d.documento || "N/I"}`, 15, 70);
        doc.text(`EMPRESA: ${d.empresa || "N/I"}`, 15, 80);
        doc.text(`SERVIÇO: ${d.servico}`, 15, 90);
        doc.text(`DESTINO: APTO ${d.apto}`, 15, 100);
        doc.save(`Recibo_${d.nome}.pdf`);
    }

    // Atualizar Tabela
    onSnapshot(query(collection(db, "registros"), orderBy("data", "desc")), (s) => {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        s.forEach(ds => {
            const data = ds.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${data.data}</td>
                <td>${data.nome}<br><b>Apto: ${data.apto}</b></td>
                <td><img src="${data.foto || 'https://via.placeholder.com/45'}" class="img-doc"></td>
                <td><button class="btn-pdf" id="pdf-${ds.id}">PDF</button></td>
            `;
            corpo.appendChild(tr);
            document.getElementById(`pdf-${ds.id}`).onclick = () => gerarPDF(data);
        });
    });
</script>
</body>
</html>
