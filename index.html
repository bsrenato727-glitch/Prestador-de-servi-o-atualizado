<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Portaria - Prestadores de Serviço</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; margin-top: 20px; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #snapshot { width: 100%; margin-top: 10px; border-radius: 8px; display: none; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        th { background-color: #007bff; color: white; }
        .img-doc { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Prestadores</h2>
    
    <label>Nome do Prestador:</label>
    <input type="text" id="nome" placeholder="Ex: João da Silva">

    <label>Documento (RG/CPF):</label>
    <input type="text" id="documento" placeholder="000.000.000-00">

    <label>Empresa/Serviço:</label>
    <input type="text" id="empresa" placeholder="Ex: Enel, Refrigeração...">

    <label>Foto do Documento/Rosto:</label>
    <input type="file" id="fotoInput" accept="image/*" capture="camera">
    <img id="snapshot" alt="Prévia da foto">

    <button onclick="salvarRegistro()">SALVAR E NOTIFICAR</button>
</div>

<table id="tabelaRegistros">
    <thead>
        <tr>
            <th>Data/Hora</th>
            <th>Nome</th>
            <th>Empresa</th>
            <th>Foto</th>
        </tr>
    </thead>
    <tbody id="corpoTabela">
        </tbody>
</table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

    // Suas configurações extraídas dos prints enviados
    const firebaseConfig = {
        apiKey: "AIzaSyDgsGwJDm4kRlpTxJ8ZOt4VjU8Iy_Ahztg",
        authDomain: "prestadores-de-servi.firebaseapp.com",
        projectId: "prestadores-de-servi",
        storageBucket: "prestadores-de-servi.firebasestorage.app",
        messagingSenderId: "1898757786612",
        appId: "1:1898757786612:web:76ca92227286918af3db91"
    };

    // Inicializa Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Prévia da foto ao selecionar
    const fotoInput = document.getElementById('fotoInput');
    const snapshot = document.getElementById('snapshot');

    fotoInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                snapshot.src = e.target.result;
                snapshot.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    // Função para Salvar
    window.salvarRegistro = async function() {
        const nome = document.getElementById('nome').value;
        const documento = document.getElementById('documento').value;
        const empresa = document.getElementById('empresa').value;
        const file = fotoInput.files[0];

        if (!nome || !documento) {
            alert("Preencha o nome e o documento!");
            return;
        }

        try {
            let fotoUrl = "";
            
            // 1. Upload da Foto (se houver)
            if (file) {
                const storageRef = ref(storage, 'fotos_prestadores/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                fotoUrl = await getDownloadURL(storageRef);
            }

            // 2. Salvar no Firestore
            await addDoc(collection(db, "registros"), {
                nome: nome,
                documento: documento,
                empresa: empresa,
                foto: fotoUrl,
                dataHora: new Date().toLocaleString("pt-BR")
            });

            alert("Registro salvo com sucesso!");
            
            // Limpa o formulário
            document.getElementById('nome').value = "";
            document.getElementById('documento').value = "";
            document.getElementById('empresa').value = "";
            snapshot.style.display = 'none';

        } catch (error) {
            console.error("Erro ao salvar:", error);
            alert("Erro ao salvar. Verifique se o Storage e o Firestore estão com as regras abertas.");
        }
    }

    // Atualizar tabela em tempo real
    const q = query(collection(db, "registros"), orderBy("dataHora", "desc"));
    onSnapshot(q, (querySnapshot) => {
        const corpoTabela = document.getElementById('corpoTabela');
        corpoTabela.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const item = doc.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.dataHora}</td>
                <td>${item.nome}</td>
                <td>${item.empresa}</td>
                <td><img src="${item.foto || 'https://via.placeholder.com/50'}" class="img-doc" onclick="window.open('${item.foto}')"></td>
            `;
            corpoTabela.appendChild(tr);
        });
    });

</script>

</body>
</html>
